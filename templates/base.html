<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NoctisAPI</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=20260207" />
    <link rel="shortcut icon" type="image/png" href="/static/favicon.png?v=20260207" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="/static/style.css?v=20260322" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-nav">
        <div class="brand">NoctisAPI</div>
        <a class="link" href="/dashboard">Dashboard</a>
        <a class="link" href="/dashboard/actors">Actors</a>
        <a class="link" href="/dashboard/alerts">Alerts</a>
        <a class="link" href="/dashboard/api-modular">API Modular</a>
        <a class="link" href="/dashboard/actors/deleted">Deleted</a>
        <a class="link" href="/dashboard/honeypot">API Health</a>
        <a class="link" href="/dashboard/environment">Environment</a>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="muted" title="Access restricted to local interface">🔒 PRIVATE ACCESS</span>
        <form method="post" action="/logout" style="margin:0;">
          <button type="submit" class="btn" style="font-size:12px;padding:4px 10px;">Logout</button>
        </form>
      </div>
    </div>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
    <script src="/static/table_utils.js?v=20260322"></script>
  </body>
</html>
